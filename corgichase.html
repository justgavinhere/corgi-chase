<div id="game-container">

  <div id="overlay">

<script>
// ── Constants ──────────────────────────────────────────────────────────────
const TILE = 40, COLS = 14, ROWS = 14;
const W = COLS * TILE, H = ROWS * TILE;
const BASE_PLAYER_MS = 180; // ms per tile
const BASE_TILE_MS   = 240; // enemy base ms per tile
const ANIM_MS = 120;
const CATCH_DIST = TILE * 0.52;
const AI_CHASE_MS = 10000, AI_SCATTER_MS = 4000;
const T = { WALL:0, PATH:1, EMPTY:2, SPAWN:3 };
const POWER_DURATIONS = [15000, 10000, 5000]; // ms per level
const HUMAN_RESPAWN_MS = 15000;

// ── Level Data ─────────────────────────────────────────────────────────────
// Open fields — no walls. '.' = cookie tile, 'P' = player start, 'S' = enemy spawn.
const LEVELS = [
  {
    enemySpeed: 1.0, enemyCount: 2,
    map: [
      'S............S',
      '..............',
      '..............',
      '..............',
      '..............',
      '..............',
      '......P.......',
      '..............',
      '..............',
      '..............',
      '..............',
      '..............',
      '..............',
      'S............S',
    ]
  },
  {
    enemySpeed: 1.3, enemyCount: 2,
    map: [
      '.......S......',
      '..............',
      '..............',
      '..............',
      '..............',
      '..............',
      'S.....P.......',
      '..............',
      '..............',
      '..............',
      '..............',
      '..............',
      '..............',
      '.......S......',
    ]
  },
  {
    enemySpeed: 1.6, enemyCount: 3,
    map: [
      'S............S',
      '..............',
      '..............',
      '..............',
      '..............',
      '..............',
      '......P.......',
      '..............',
      '..............',
      '..............',
      '..............',
      '..............',
      '..............',
      '......S.......',
    ]
  }
];

// ── Canvas Setup ───────────────────────────────────────────────────────────
const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');
const overlay = document.getElementById('overlay');

// ── Game State ─────────────────────────────────────────────────────────────
let gameState = 'MENU'; // MENU PLAYING CAUGHT LEVEL_COMPLETE GAME_OVER WIN_GAME
let currentLevel = 0;
let score = 0;
let lastTime = 0;
let animTimer = 0;
let aiModeTimer = 0;
let aiMode = 'chase';
let mazeData, cookies, cookiesTotal, cookiesEaten;
let wallCache;
let enemies = [];
let player;
let levelPlayerStart, levelSpawns, levelConfig;

// ── Maze Parsing ───────────────────────────────────────────────────────────
function parseMaze(mapStrings) {
  const data = new Uint8Array(COLS * ROWS);
  const cook = new Uint8Array(COLS * ROWS);
  let playerStart = { col: 7, row: 7 };
  const spawns = [];
  for (let r = 0; r < ROWS; r++) {
    const row = mapStrings[r] || '';
    for (let c = 0; c < COLS; c++) {
      const ch = row[c] || '#';
      if (ch === '#') { data[r*COLS+c] = T.WALL; }
      else if (ch === 'S') { data[r*COLS+c] = T.SPAWN; spawns.push({col:c,row:r}); }
      else if (ch === 'P') { data[r*COLS+c] = T.EMPTY; playerStart = {col:c,row:r}; }
      else if (ch === '.') { data[r*COLS+c] = T.PATH; cook[r*COLS+c] = 1; }
      else { data[r*COLS+c] = T.EMPTY; }
    }
  }
  return { data, cook, playerStart, spawns };
}

function isWalkable(data, c, r) {
  if (c < 0 || c >= COLS || r < 0 || r >= ROWS) return false;
  return data[r*COLS+c] !== T.WALL;
}

// ── BFS Pathfinding ────────────────────────────────────────────────────────
function bfsNextDir(data, fc, fr, tc, tr) {
  if (fc === tc && fr === tr) return null;
  const visited = new Uint8Array(COLS * ROWS);
  const queue = [];
  const DIRS4 = [{dc:0,dr:-1,n:'up'},{dc:0,dr:1,n:'down'},{dc:-1,dr:0,n:'left'},{dc:1,dr:0,n:'right'}];
  visited[fr*COLS+fc] = 1;
  for (const d of DIRS4) {
    const nc = fc+d.dc, nr = fr+d.dr;
    if (isWalkable(data,nc,nr) && !visited[nr*COLS+nc]) {
      visited[nr*COLS+nc] = 1;
      queue.push({col:nc,row:nr,first:d.n});
    }
  }
  while (queue.length) {
    const cur = queue.shift();
    if (cur.col===tc && cur.row===tr) return cur.first;
    for (const d of DIRS4) {
      const nc = cur.col+d.dc, nr = cur.row+d.dr;
      if (isWalkable(data,nc,nr) && !visited[nr*COLS+nc]) {
        visited[nr*COLS+nc] = 1;
        queue.push({col:nc,row:nr,first:cur.first});
      }
    }
  }
  return null;
}

const DIR_DELTA = {up:{dc:0,dr:-1},down:{dc:0,dr:1},left:{dc:-1,dr:0},right:{dc:1,dr:0}};

function dirAngle(dir) {
  return {right:0,down:Math.PI/2,left:Math.PI,up:-Math.PI/2}[dir] ?? 0;
}

function lerp(a, b, t) { return a + (b-a)*t; }

// ── Off-screen Wall Cache ──────────────────────────────────────────────────
function buildWallCache() {
  wallCache = new OffscreenCanvas(W, H);
  const wc = wallCache.getContext('2d');
  // Fill entire field
  wc.fillStyle = '#16213e';
  wc.fillRect(0, 0, W, H);
  // Subtle grid lines so tiles are visible
  wc.strokeStyle = '#1e2d50';
  wc.lineWidth = 1;
  for (let r = 0; r <= ROWS; r++) {
    wc.beginPath(); wc.moveTo(0, r*TILE); wc.lineTo(W, r*TILE); wc.stroke();
  }
  for (let c = 0; c <= COLS; c++) {
    wc.beginPath(); wc.moveTo(c*TILE, 0); wc.lineTo(c*TILE, H); wc.stroke();
  }
}

// ── Level Load ─────────────────────────────────────────────────────────────
function loadLevel(n) {
  const lvl = LEVELS[n];
  const parsed = parseMaze(lvl.map);
  mazeData = parsed.data;
  cookies  = parsed.cook;
  cookiesTotal = cookies.reduce((a,b)=>a+b,0);
  cookiesEaten = 0;
  buildWallCache();
  powerCookiePositions = getPowerCookiePositions();

  // Store spawn info so respawnActors() can reuse it without re-parsing
  levelPlayerStart = parsed.playerStart;
  levelSpawns      = parsed.spawns;
  levelConfig      = lvl;

  respawnActors(3); // fresh level always starts with 3 lives
}

// ── Respawn actors at original positions (keeps cookies intact) ────────────
function respawnActors(livesOverride) {
  const ps = levelPlayerStart;
  const lives = livesOverride !== undefined ? livesOverride : player.lives;
  player = {
    col: ps.col, row: ps.row,
    px: ps.col*TILE+TILE/2, py: ps.row*TILE+TILE/2,
    prevPx: ps.col*TILE+TILE/2, prevPy: ps.row*TILE+TILE/2,
    dir: 'left', nextDir: 'left',
    moveTimer: 0, speed: 1.0,
    frame: 0, frameTimer: 0,
    lives,
    invincible: 2000,
    powered: 0,
  };

  enemies = [];
  const scatterCorners = [
    {col:COLS-2, row:1},
    {col:1,      row:ROWS-2},
    {col:COLS-2, row:ROWS-2},
  ];
  for (let i = 0; i < Math.min(levelConfig.enemyCount, levelSpawns.length || 1); i++) {
    const sp = levelSpawns[i] || {col:7, row:6};
    enemies.push({
      col: sp.col, row: sp.row,
      px: sp.col*TILE+TILE/2, py: sp.row*TILE+TILE/2,
      targetCol: sp.col, targetRow: sp.row,
      dir: 'left', speed: levelConfig.enemySpeed,
      frame: 0, humanIndex: i % 2,
      moveTimer: 999,
      scatter: false,
      scatterTarget: scatterCorners[i] || scatterCorners[0],
      startDelay: i * 1200,
      spawnCol: sp.col, spawnRow: sp.row, // original spawn for respawn
      eaten: false, respawnTimer: 0,
    });
  }

  aiModeTimer = 0;
  aiMode = 'chase';
}

// ── Sprite: Corgi ──────────────────────────────────────────────────────────
function drawCorgi(cx, x, y, frame, dir, mini) {
  const s = mini ? 0.45 : 1;
  cx.save();
  cx.translate(x, y);
  cx.rotate(dirAngle(dir));
  cx.scale(s, s);

  // Body
  cx.fillStyle = '#C8A96E';
  roundRect(cx, -14, -9, 28, 18, 6);
  cx.fill();

  // Tail (wag)
  const wagAngle = (frame % 2 === 0 ? 0.35 : -0.35);
  cx.save();
  cx.translate(-14, 0);
  cx.rotate(wagAngle + Math.PI*0.15);
  cx.strokeStyle = '#C8A96E';
  cx.lineWidth = 4;
  cx.lineCap = 'round';
  cx.beginPath();
  cx.moveTo(0, 0);
  cx.quadraticCurveTo(-8, -10, -4, -16);
  cx.stroke();
  cx.restore();

  // Legs
  cx.fillStyle = '#B8946A';
  const legPairs = [[6,-12],[6,12],[-4,-12],[-4,12]];
  for (let i = 0; i < 4; i++) {
    const [lx, lz] = legPairs[i];
    const lift = ((i < 2 && frame < 2) || (i >= 2 && frame >= 2)) ? -3 : 0;
    cx.beginPath();
    cx.ellipse(lz, lx + lift, 4, 5, 0, 0, Math.PI*2);
    cx.fill();
  }

  // Head
  cx.fillStyle = '#C8A96E';
  cx.beginPath();
  cx.arc(17, 0, 11, 0, Math.PI*2);
  cx.fill();

  // Ears
  cx.fillStyle = '#8B6914';
  // left ear (droopy)
  cx.beginPath();
  cx.moveTo(12, -7);
  cx.lineTo(20, -13);
  cx.lineTo(26, -5);
  cx.closePath();
  cx.fill();
  // right ear
  cx.beginPath();
  cx.moveTo(12, 7);
  cx.lineTo(20, 13);
  cx.lineTo(26, 5);
  cx.closePath();
  cx.fill();

  // Snout
  cx.fillStyle = '#E8C99E';
  cx.beginPath();
  cx.ellipse(24, 0, 6, 5, 0, 0, Math.PI*2);
  cx.fill();
  cx.fillStyle = '#5a3a1a';
  cx.beginPath(); cx.arc(23, -1.5, 1.2, 0, Math.PI*2); cx.fill();
  cx.beginPath(); cx.arc(25.5, -1.5, 1.2, 0, Math.PI*2); cx.fill();

  // Eye
  cx.fillStyle = '#fff';
  cx.beginPath(); cx.arc(19, -5, 3.5, 0, Math.PI*2); cx.fill();
  cx.fillStyle = '#222';
  cx.beginPath(); cx.arc(20, -5, 2, 0, Math.PI*2); cx.fill();

  // Tongue
  if (frame === 1) {
    cx.fillStyle = '#ff8fa3';
    cx.beginPath();
    cx.ellipse(27, 3, 3, 4, 0.3, 0, Math.PI*2);
    cx.fill();
  }

  cx.restore();
}

// ── Sprite: Shark (powered corgi) ─────────────────────────────────────────
function drawShark(cx, x, y, frame, dir) {
  cx.save();
  cx.translate(x, y);
  cx.rotate(dirAngle(dir));

  // Body — sleek torpedo
  cx.fillStyle = '#5a8faa';
  cx.beginPath();
  cx.ellipse(0, 0, 19, 9, 0, 0, Math.PI*2);
  cx.fill();

  // White belly
  cx.fillStyle = '#dff0f0';
  cx.beginPath();
  cx.ellipse(1, 4, 13, 5, 0.15, 0, Math.PI*2);
  cx.fill();

  // Tail fin
  cx.fillStyle = '#3a6f88';
  cx.beginPath();
  cx.moveTo(-15, 0);
  cx.lineTo(-24, -9);
  cx.lineTo(-19, 0);
  cx.lineTo(-24,  9);
  cx.closePath();
  cx.fill();

  // Dorsal fin (bobs with frame)
  const finBob = frame % 2 === 0 ? 0 : 1;
  cx.fillStyle = '#3a6f88';
  cx.beginPath();
  cx.moveTo(-2, -9 + finBob);
  cx.lineTo(5, -20 + finBob);
  cx.lineTo(10, -9 + finBob);
  cx.closePath();
  cx.fill();

  // Pectoral fin
  cx.fillStyle = '#4a7f98';
  cx.beginPath();
  cx.moveTo(3, 5);
  cx.lineTo(10, 15);
  cx.lineTo(-1, 10);
  cx.closePath();
  cx.fill();

  // Eye
  cx.fillStyle = '#111';
  cx.beginPath(); cx.arc(13, -2, 2.8, 0, Math.PI*2); cx.fill();
  cx.fillStyle = '#fff';
  cx.beginPath(); cx.arc(13.8, -2.8, 1, 0, Math.PI*2); cx.fill();

  // Teeth — menacing grin
  cx.fillStyle = '#fff';
  for (let i = 0; i < 4; i++) {
    const tx = 12 + i * 3.2;
    cx.beginPath();
    cx.moveTo(tx, 3);
    cx.lineTo(tx + 1.4, 8);
    cx.lineTo(tx + 2.8, 3);
    cx.fill();
  }

  cx.restore();
}

// ── Sprite: Human ─────────────────────────────────────────────────────────
function drawHuman(cx, x, y, frame, dir, idx, frightened) {
  const color = frightened ? '#5588cc' : (idx === 0 ? '#e94560' : '#a8dadc');
  cx.save();
  cx.translate(x, y);
  cx.rotate(dirAngle(dir));

  // Legs
  cx.fillStyle = '#444';
  const legOff = frame % 2 === 0 ? 5 : -5;
  cx.beginPath(); cx.ellipse(4, -legOff, 4, 7, 0, 0, Math.PI*2); cx.fill();
  cx.beginPath(); cx.ellipse(4,  legOff, 4, 7, 0, 0, Math.PI*2); cx.fill();

  // Body
  cx.fillStyle = color;
  roundRect(cx, -12, -8, 18, 20, 5);
  cx.fill();

  // Head
  cx.fillStyle = '#FDBCB4';
  cx.beginPath(); cx.arc(0, -16, 10, 0, Math.PI*2); cx.fill();

  // Hair — stands on end when frightened
  cx.fillStyle = frightened ? '#5588cc' : (idx === 0 ? '#5a3a1a' : '#2a2a5a');
  if (frightened) {
    // Spiky scared hair
    for (let s = -3; s <= 3; s++) {
      cx.beginPath(); cx.moveTo(s*3, -26); cx.lineTo(s*3, -32); cx.lineWidth=2; cx.strokeStyle='#5588cc'; cx.stroke();
    }
  } else {
    cx.beginPath(); cx.arc(0, -23, 7, Math.PI, 0); cx.fill();
  }

  // Eyes — wide and scared when frightened
  cx.fillStyle = '#fff';
  cx.beginPath(); cx.arc(-4, -17, frightened ? 3.5 : 2.5, 0, Math.PI*2); cx.fill();
  cx.beginPath(); cx.arc(4,  -17, frightened ? 3.5 : 2.5, 0, Math.PI*2); cx.fill();
  cx.fillStyle = '#222';
  cx.beginPath(); cx.arc(-3.5, -17, frightened ? 2 : 1.5, 0, Math.PI*2); cx.fill();
  cx.beginPath(); cx.arc(4.5,  -17, frightened ? 2 : 1.5, 0, Math.PI*2); cx.fill();
  // Scared sweat drop
  if (frightened) {
    cx.fillStyle = '#88aaff';
    cx.beginPath(); cx.arc(9, -14, 2, 0, Math.PI*2); cx.fill();
  }

  // Arms — raised in panic when frightened, holding leash otherwise
  cx.strokeStyle = '#FDBCB4';
  cx.lineWidth = 3;
  cx.lineCap = 'round';
  if (frightened) {
    // Both arms raised
    cx.beginPath(); cx.moveTo(-6, 2); cx.lineTo(-14, -10); cx.stroke();
    cx.beginPath(); cx.moveTo(6, 2);  cx.lineTo(14, -10);  cx.stroke();
  } else {
    cx.beginPath(); cx.moveTo(6, 0); cx.lineTo(16, -4); cx.stroke();
    cx.strokeStyle = '#c8a96e';
    cx.lineWidth = 2;
    cx.beginPath(); cx.arc(19, -5, 4, 0, Math.PI*1.5); cx.stroke();
  }

  cx.restore();
}

// ── Sprite: Dog Biscuit (bone-shaped) ────────────────────────────────────
function drawBiscuit(cx, x, y, scale, glowTs) {
  cx.save();
  cx.translate(x, y);
  cx.rotate(Math.PI / 8); // slight diagonal tilt like a dropped treat

  // Glow effect for power biscuit
  if (glowTs !== undefined) {
    cx.shadowColor = '#f9c74f';
    cx.shadowBlur = 14 + Math.sin(glowTs * 0.005) * 7;
  }

  cx.scale(scale, scale);

  const hw = 8;   // half-width of center bar
  const hh = 2.8; // half-height of center bar
  const kr = 4.2; // knob radius

  // Base biscuit color (warm Milk-Bone tan)
  cx.fillStyle = '#D4A06A';

  // Center bar
  cx.beginPath();
  cx.rect(-hw, -hh, hw * 2, hh * 2);
  cx.fill();

  // Four corner knobs
  for (const kx of [-hw, hw]) {
    for (const ky of [-hh, hh]) {
      cx.beginPath();
      cx.arc(kx, ky, kr, 0, Math.PI * 2);
      cx.fill();
    }
  }

  // Lighter highlight stripe across the middle (baked texture)
  cx.fillStyle = 'rgba(255,220,160,0.35)';
  cx.beginPath();
  cx.rect(-hw + 1, -1, (hw - 1) * 2, 2);
  cx.fill();

  // Subtle darker edge outline
  cx.strokeStyle = '#A0722A';
  cx.lineWidth = 0.8;
  // Outline the bar
  cx.strokeRect(-hw, -hh, hw * 2, hh * 2);
  // Outline each knob
  for (const kx of [-hw, hw]) {
    for (const ky of [-hh, hh]) {
      cx.beginPath();
      cx.arc(kx, ky, kr, 0, Math.PI * 2);
      cx.stroke();
    }
  }

  cx.restore();
}

function drawCookie(cx, x, y) {
  drawBiscuit(cx, x, y, 1, undefined);
}

function drawPowerCookie(cx, x, y, ts) {
  drawBiscuit(cx, x, y, 1.55, ts);
}

// ── Audio ──────────────────────────────────────────────────────────────────
let audioCtx = null;

function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, type, duration, vol, start, freqEnd) {
  if (!audioCtx) return;
  const osc  = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, start);
  if (freqEnd) osc.frequency.exponentialRampToValueAtTime(freqEnd, start + duration);
  gain.gain.setValueAtTime(vol, start);
  gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
  osc.start(start);
  osc.stop(start + duration + 0.02);
}

function sfxMunch() {
  initAudio();
  const t = audioCtx.currentTime;
  playTone(540, 'square', 0.055, 0.12, t, 210);
}

function sfxPowerMunch() {
  initAudio();
  const t = audioCtx.currentTime;
  playTone(360, 'sawtooth', 0.13, 0.18, t, 130);
  playTone(540, 'square',   0.08, 0.10, t, 210);
}

function sfxCaught() {
  initAudio();
  const t = audioCtx.currentTime;
  playTone(440, 'sine', 0.28, 0.28, t,        260);
  playTone(260, 'sine', 0.28, 0.20, t + 0.25, 110);
}

function sfxGameOver() {
  initAudio();
  const t = audioCtx.currentTime;
  [349, 311, 277, 220].forEach((f, i) => {
    playTone(f, 'sine', 0.22, 0.25, t + i * 0.18, f * 0.85);
  });
}

function sfxLevelClear() {
  initAudio();
  const t = audioCtx.currentTime;
  [523, 659, 784, 1047].forEach((f, i) => {
    playTone(f, 'sine', 0.14, 0.28, t + i * 0.11);
  });
}

function sfxEatHuman() {
  initAudio();
  const t = audioCtx.currentTime;
  playTone(200, 'sawtooth', 0.08, 0.25, t, 80);
  playTone(150, 'sine',     0.15, 0.20, t + 0.06, 60);
}

function sfxWin() {
  initAudio();
  const t = audioCtx.currentTime;
  const melody = [523, 659, 784, 1047, 784, 1047, 1175];
  const durs   = [0.12,0.12,0.12, 0.22,0.12, 0.22, 0.40];
  let time = t;
  melody.forEach((f, i) => {
    playTone(f, 'sine', durs[i], 0.30, time);
    time += durs[i] + 0.03;
  });
}

// ── Power cookie positions (corners of each level) ────────────────────────
function getPowerCookiePositions() {
  const pos = [];
  const candidates = [{c:1,r:1},{c:COLS-2,r:1},{c:1,r:ROWS-2},{c:COLS-2,r:ROWS-2}];
  for (const {c,r} of candidates) {
    if (mazeData[r*COLS+c] !== T.WALL) pos.push({c,r});
  }
  return pos;
}

// ── Helpers ────────────────────────────────────────────────────────────────
function roundRect(cx, x, y, w, h, r) {
  cx.beginPath();
  cx.moveTo(x+r, y);
  cx.arcTo(x+w, y, x+w, y+h, r);
  cx.arcTo(x+w, y+h, x, y+h, r);
  cx.arcTo(x, y+h, x, y, r);
  cx.arcTo(x, y, x+w, y, r);
  cx.closePath();
}

// ── Player Update ──────────────────────────────────────────────────────────
function updatePlayer(dt) {
  if (player.invincible > 0) player.invincible -= dt;
  if (player.powered   > 0) player.powered   -= dt;

  const tileDur = BASE_PLAYER_MS / player.speed;
  player.moveTimer += dt;
  const t = Math.min(player.moveTimer / tileDur, 1.0);

  // pixel interpolation toward target
  const tx = player.col*TILE+TILE/2, ty = player.row*TILE+TILE/2;
  // source is previous tile (we recalc when arriving)
  player.px = lerp(player.prevPx ?? tx, tx, t);
  player.py = lerp(player.prevPy ?? ty, ty, t);

  if (player.moveTimer >= tileDur) {
    player.px = tx; player.py = ty;
    player.moveTimer = 0;
    player.prevPx = tx; player.prevPy = ty;

    // try next direction first, then current
    for (const tryDir of [player.nextDir, player.dir]) {
      const {dc, dr} = DIR_DELTA[tryDir];
      const nc = player.col+dc, nr = player.row+dr;
      if (isWalkable(mazeData, nc, nr)) {
        player.dir = tryDir;
        player.col = nc; player.row = nr;
        player.prevPx = tx; player.prevPy = ty;
        break;
      }
    }
  }
}

// ── Enemy Update ───────────────────────────────────────────────────────────
function getFurthestCorner(fromCol, fromRow) {
  const corners = [{col:1,row:1},{col:COLS-2,row:1},{col:1,row:ROWS-2},{col:COLS-2,row:ROWS-2}];
  return corners.reduce((best, c) => {
    const d = Math.abs(c.col-fromCol) + Math.abs(c.row-fromRow);
    const db = Math.abs(best.col-fromCol) + Math.abs(best.row-fromRow);
    return d > db ? c : best;
  });
}

function updateEnemy(e, dt) {
  if (e.startDelay > 0) { e.startDelay -= dt; return; }

  // Eaten — count down then respawn
  if (e.eaten) {
    e.respawnTimer -= dt;
    if (e.respawnTimer <= 0) {
      e.eaten = false;
      e.col = e.spawnCol; e.row = e.spawnRow;
      e.px  = e.col*TILE+TILE/2; e.py = e.row*TILE+TILE/2;
      e.targetCol = e.col; e.targetRow = e.row;
      e.prevCol = e.col;   e.prevRow = e.row;
      e.moveTimer = 999;
    }
    return;
  }

  // Frightened — run away at half speed
  const frightened = player.powered > 0;
  const speedMult  = frightened ? 0.5 : 1.0;
  const tileDur = BASE_TILE_MS / (e.speed * speedMult);
  e.moveTimer += dt;
  const t = Math.min(e.moveTimer / tileDur, 1.0);

  e.px = lerp((e.prevCol ?? e.col)*TILE+TILE/2, e.targetCol*TILE+TILE/2, t);
  e.py = lerp((e.prevRow ?? e.row)*TILE+TILE/2, e.targetRow*TILE+TILE/2, t);

  if (e.moveTimer >= tileDur) {
    e.col = e.targetCol;
    e.row = e.targetRow;
    e.px = e.col*TILE+TILE/2;
    e.py = e.row*TILE+TILE/2;
    e.moveTimer = 0;
    e.prevCol = e.col;
    e.prevRow = e.row;

    // Frightened: flee to the corner farthest from the player
    // Normal: chase or scatter per AI mode
    const target = frightened
      ? getFurthestCorner(player.col, player.row)
      : (aiMode === 'scatter' ? e.scatterTarget : {col: player.col, row: player.row});

    const dir = bfsNextDir(mazeData, e.col, e.row, target.col, target.row);
    const chosen = dir || e.dir;
    const {dc, dr} = DIR_DELTA[chosen];
    const nc = e.col+dc, nr = e.row+dr;
    if (isWalkable(mazeData, nc, nr)) {
      e.dir = chosen;
      e.targetCol = nc;
      e.targetRow = nr;
    }
  }
}

function updateAIMode(dt) {
  aiModeTimer += dt;
  const limit = aiMode === 'chase' ? AI_CHASE_MS : AI_SCATTER_MS;
  if (aiModeTimer >= limit) {
    aiModeTimer = 0;
    aiMode = aiMode === 'chase' ? 'scatter' : 'chase';
  }
}

// ── Cookie / Collision ─────────────────────────────────────────────────────
function checkCookies() {
  const idx = player.row*COLS+player.col;
  if (cookies[idx] === 1) {
    cookies[idx] = 0;
    cookiesEaten++;
    const isPower = powerCookiePositions.some(p => p.c === player.col && p.r === player.row);
    if (isPower) {
      score += 50;
      sfxPowerMunch();
      player.powered = POWER_DURATIONS[currentLevel];
    } else { score += 10; sfxMunch(); }
    if (cookiesEaten >= cookiesTotal) {
      setState(currentLevel >= LEVELS.length-1 ? 'WIN_GAME' : 'LEVEL_COMPLETE');
    }
  }
}

function checkEnemyCatch() {
  if (player.invincible > 0) return;
  for (const e of enemies) {
    if (e.startDelay > 0 || e.eaten) continue;
    const dx = e.px - player.px, dy = e.py - player.py;
    if (Math.sqrt(dx*dx+dy*dy) < CATCH_DIST) {
      if (player.powered > 0) {
        // Shark chomps the human
        e.eaten = true;
        e.respawnTimer = HUMAN_RESPAWN_MS;
        score += 200;
        sfxEatHuman();
      } else {
        player.lives--;
        if (player.lives <= 0) { sfxGameOver(); setState('GAME_OVER'); }
        else { sfxCaught(); setState('CAUGHT'); }
        return;
      }
    }
  }
}

// ── Animation Frames ───────────────────────────────────────────────────────
function updateAnimFrames(dt) {
  animTimer += dt;
  if (animTimer >= ANIM_MS) {
    animTimer -= ANIM_MS;
    player.frame = (player.frame+1)%4;
    for (const e of enemies) e.frame = (e.frame+1)%4;
  }
}

// ── Render ─────────────────────────────────────────────────────────────────
let powerCookiePositions = [];

function render(ts) {
  ctx.clearRect(0, 0, W, H+40);

  // Maze (cached walls + floor)
  ctx.drawImage(wallCache, 0, 0);

  // Cookies
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (cookies[r*COLS+c]) {
        const cx2 = c*TILE+TILE/2, cy2 = r*TILE+TILE/2;
        // check if power cookie position
        const isPower = powerCookiePositions.some(p=>p.c===c&&p.r===r);
        if (isPower) drawPowerCookie(ctx, cx2, cy2, ts);
        else drawCookie(ctx, cx2, cy2);
      }
    }
  }

  // Enemies (behind player)
  const frightened = player.powered > 0;
  const nearEnd    = player.powered > 0 && player.powered < 3000;
  for (const e of enemies) {
    if (e.startDelay > 0 || e.eaten) continue;
    // Flash human between frightened/normal in last 3 seconds
    const showFrightened = frightened && !(nearEnd && Math.floor(player.powered/300)%2===0);
    drawHuman(ctx, e.px, e.py, e.frame, e.dir, e.humanIndex, showFrightened);
  }

  // Player — shark when powered (flashes back to corgi in last 3s), normal otherwise
  const showShark = player.powered > 0 && !(nearEnd && Math.floor(player.powered/300)%2===0);
  if (player.invincible <= 0 || Math.floor(player.invincible/100)%2===0) {
    if (showShark) drawShark(ctx, player.px, player.py, player.frame, player.dir);
    else           drawCorgi(ctx, player.px, player.py, player.frame, player.dir, false);
  }

  // HUD
  drawHUD(ts);
}

function drawHUD(ts) {
  const y = H;
  ctx.fillStyle = '#16213e';
  ctx.fillRect(0, y, W, 40);

  // Lives as mini corgis
  for (let i = 0; i < player.lives; i++) {
    drawCorgi(ctx, 18 + i*28, y+20, 0, 'right', true);
  }

  // Score
  ctx.fillStyle = '#eee';
  ctx.font = 'bold 15px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(`Score: ${score}`, W/2, y+26);

  // Level
  ctx.fillStyle = '#a8dadc';
  ctx.textAlign = 'right';
  ctx.fillText(`Level ${currentLevel+1}`, W-10, y+26);

  ctx.textAlign = 'left';
}

// ── State Machine ──────────────────────────────────────────────────────────
function setState(s) {
  gameState = s;
  switch(s) {
    case 'MENU':
      overlay.classList.remove('hidden');
      overlay.innerHTML = `
        <h1>CORGI CHASE</h1>
        <h2>Eat all the cookies!</h2>
        <p>Use arrow keys or WASD to move.<br>Avoid the humans — they want to leash you!</p>
        <button class="btn" id="startBtn">Start Game</button>`;
      document.getElementById('startBtn').onclick = () => {
        initAudio();
        currentLevel = 0; score = 0;
        player = null;
        loadLevel(0);
        setState('PLAYING');
      };
      break;

    case 'PLAYING':
      overlay.classList.add('hidden');
      break;

    case 'CAUGHT':
      overlay.classList.remove('hidden');
      overlay.innerHTML = `
        <h1 style="color:#e94560">Oh no!</h1>
        <h2>Caught by a human!</h2>
        <p>Lives remaining: ${'🐾'.repeat(Math.max(player.lives,0))}</p>
        <button class="btn" id="continueBtn">Try Again</button>`;
      document.getElementById('continueBtn').onclick = () => {
        respawnActors();
        setState('PLAYING');
      };
      break;

    case 'LEVEL_COMPLETE':
      sfxLevelClear();
      overlay.classList.remove('hidden');
      overlay.innerHTML = `
        <h1 style="color:#a8dadc">Level Clear!</h1>
        <h2>All cookies eaten!</h2>
        <div class="score-big">Score: ${score}</div>
        <button class="btn" id="nextBtn">Next Level</button>`;
      document.getElementById('nextBtn').onclick = () => {
        currentLevel++;
        loadLevel(currentLevel);
        setState('PLAYING');
      };
      break;

    case 'GAME_OVER':
      overlay.classList.remove('hidden');
      overlay.innerHTML = `
        <h1 style="color:#e94560">Game Over</h1>
        <h2>The humans won...</h2>
        <div class="score-big">Score: ${score}</div>
        <button class="btn" id="replayBtn">Play Again</button>`;
      document.getElementById('replayBtn').onclick = () => setState('MENU');
      break;

    case 'WIN_GAME':
      sfxWin();
      overlay.classList.remove('hidden');
      overlay.innerHTML = `
        <h1 style="color:#f9c74f">You Win!</h1>
        <h2>The corgi runs free!</h2>
        <div class="score-big">Final Score: ${score}</div>
        <p>All cookies eaten across all levels!</p>
        <button class="btn" id="replayBtn">Play Again</button>`;
      document.getElementById('replayBtn').onclick = () => setState('MENU');
      break;
  }
}

// ── Input ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const map = {ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right',
               w:'up',s:'down',a:'left',d:'right',W:'up',S:'down',A:'left',D:'right'};
  if (map[e.key]) {
    if (gameState === 'PLAYING') player.nextDir = map[e.key];
    e.preventDefault();
  }
});

// ── Game Loop ──────────────────────────────────────────────────────────────
function gameLoop(ts) {
  requestAnimationFrame(gameLoop);
  if (gameState !== 'PLAYING') return;
  const dt = Math.min(ts - (lastTime||ts), 50);
  lastTime = ts;
  updateAIMode(dt);
  updatePlayer(dt);
  for (const e of enemies) updateEnemy(e, dt);
  checkCookies();
  checkEnemyCatch();
  updateAnimFrames(dt);
  render(ts);
}

// ── Boot ───────────────────────────────────────────────────────────────────
setState('MENU');
requestAnimationFrame(gameLoop);
</script>
</body>
